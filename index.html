<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="テニス抽選">
<title>ダブルス抽選</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-light: #E1F5EE;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --bg: #f5f7f5;
  --surface: #ffffff;
  --surface2: #f0f3f0;
  --border: rgba(0,0,0,0.1);
  --text: #1a1a1a;
  --text2: #555;
  --text3: #999;
  --radius: 14px;
  --radius-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; max-width: 480px;
  margin: 0 auto; padding-bottom: 20px;
}
.header {
  background: var(--green); color: #fff;
  padding: 48px 20px 18px;
  position: sticky; top: 0; z-index: 10;
  overflow: hidden;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
.header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.bottom-nav {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; z-index: 20;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; padding: 10px 4px 8px; background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--text3); transition: color .2s;
}
.nav-btn.active { color: var(--green); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 10px; font-family: 'Noto Sans JP', sans-serif; }
.section { display: none; padding: 16px; }
.section.active { display: block; }
.sec-label {
  font-size: 12px; font-weight: 700; color: var(--green);
  letter-spacing: 0.08em; margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.sec-label button {
  font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}
.check-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px;
  cursor: pointer;
}
.check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
.check-row label { font-size: 15px; font-weight: 500; cursor: pointer; color: var(--text); }
.check-row span { font-size: 12px; color: var(--text3); margin-left: auto; }
.step-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
}
.step-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green); color: #fff; font-size: 11px; font-weight: 700;
  margin-right: 6px;
}
.step-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.count-input-row { display: flex; gap: 8px; align-items: center; }
.count-input-row input {
  flex: 1; font-size: 22px; font-weight: 700; color: var(--green);
  text-align: center; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); font-family: 'Noto Sans JP', sans-serif;
  outline: none;
}
.count-input-row input:focus { border-color: var(--green); }
.count-input-row .unit { font-size: 15px; color: var(--text2); flex-shrink: 0; }
.cnt-ok-btn {
  padding: 10px 20px; background: var(--green); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap;
  transition: background .15s;
}
.cnt-ok-btn:active { background: var(--green-dark); }
.name-list { display: flex; flex-direction: column; gap: 8px; }
.name-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 8px 8px 12px;
}
.name-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--green-light); color: var(--green-dark);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.name-input {
  flex: 1; min-width: 0; font-size: 15px; border: none; outline: none;
  background: transparent; color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
}
.name-input::placeholder { color: var(--text3); }
.mic-btn {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; transition: background .15s;
}
.mic-btn:active { background: var(--green-light); }
.mic-btn.recording { background: #FCEBEB; color: #E24B4A; animation: pulse .6s infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }
.btn-primary {
  width: 100%; padding: 15px; background: var(--green); color: #fff;
  border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: background .15s, transform .1s; margin-top: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:active { background: var(--green-dark); transform: scale(0.98); }
.btn-secondary {
  width: 100%; padding: 13px; background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 15px; font-weight: 500; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; margin-top: 8px; transition: background .15s;
}
.btn-secondary:active { background: var(--surface2); }
.serve-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.4);
  border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700;
  margin-left: auto;
}
.serve-btn {
  width: 100%; padding: 13px; background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 15px; font-weight: 500; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; margin-top: 8px; transition: background .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.serve-btn:active { background: var(--surface2); }
.serve-btn.active { background: #FAEEDA; border-color: #BA7517; color: #BA7517; }
.court-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); margin-bottom: 10px;
  overflow: hidden; animation: fadeUp .3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.court-card:nth-child(2){animation-delay:.05s}
.court-card:nth-child(3){animation-delay:.1s}
.court-card:nth-child(4){animation-delay:.15s}
.court-top {
  background: var(--green); color: #fff;
  padding: 8px 14px; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}
.court-body { padding: 12px; }
.vs-grid { display: grid; grid-template-columns: 1fr 32px 1fr; gap: 6px; align-items: center; }
.team { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.team-lbl { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: .08em; margin-bottom: 6px; }
.pname { font-size: 14px; font-weight: 500; padding: 2px 0; }
.pname.server { color: var(--green-dark); font-weight: 700; }
.vs-text { text-align: center; font-size: 14px; font-weight: 700; color: var(--text3); }
.leftover-card {
  background: var(--surface); border: 1px dashed var(--border);
  border-radius: var(--radius); padding: 12px; margin-bottom: 10px; text-align: center;
}
.leftover-lbl { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .08em; margin-bottom: 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px; font-size: 13px; color: var(--text);
}
.warn {
  background: var(--amber-light); color: var(--amber);
  border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; margin-top: 8px;
}
.history-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 10px;
}
.history-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.history-date { font-size: 12px; color: var(--text3); }
.history-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; }
.history-line { font-size: 13px; color: var(--text2); padding: 2px 0; }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.8; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.cost-result {
  background: var(--green-light); border: 1px solid var(--green);
  border-radius: var(--radius-sm); padding: 12px 16px;
  margin-top: 10px; text-align: center;
}
.cost-result .per-person { font-size: 22px; font-weight: 700; color: var(--green-dark); }
.cost-result .label { font-size: 12px; color: var(--green-dark); margin-top: 2px; }
</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>

<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>🎾 ダブルス抽選</h1>
      <p>テニスダブルスのコートを自動組み合わせ</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <a href="index_en.html" style="color:rgba(255,255,255,0.8);font-size:11px;text-decoration:underline;font-family:'Noto Sans JP',sans-serif">English</a>
      <button id="resetBtn" onclick="resetAll()" style="display:none;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap">
        🏠 最初から
      </button>
    </div>
  </div>
</div>


<!-- 参加者タブ -->
<div id="sec-players" class="section active">

  <!-- 名前入力不要チェック -->
  <label class="check-row">
    <input type="checkbox" id="noNameChk" onchange="onNoNameChange()">
    <span style="font-size:15px;font-weight:500;color:var(--text)">名前入力不要（番号のみ）</span>
    <span>番号で抽選</span>
  </label>

  <!-- STEP 1: 人数入力 -->
  <div class="step-card">
    <div class="step-title"><span class="step-num">1</span>参加人数を入力</div>
    <div style="display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;gap:6px">
      <input id="cntInput" type="number" inputmode="numeric" pattern="[0-9]*"
        min="4" max="30" placeholder="例: 8"
        style="flex:1;font-size:22px;font-weight:700;color:var(--green);text-align:center;padding:10px 0;border:none;outline:none;background:transparent;font-family:'Noto Sans JP',sans-serif"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');confirmCount()"
        onkeydown="if(event.key==='Enter')confirmCount()">
      <span style="font-size:14px;color:var(--text3)">人</span>
      <button class="mic-btn" id="micCount" onclick="startVoiceCount()" title="音声入力">🎤</button>
    </div>
    <div id="cntError" style="font-size:12px;color:var(--amber);margin-top:8px;display:none"></div>
  </div>

  <!-- STEP 2: 名前入力（名前不要モードOFFのとき表示） -->
  <div class="step-card" id="step2Card" style="display:none">
    <div class="step-title"><span class="step-num">2</span>名前を入力（省略可）</div>
    <div class="name-list" id="nameList"></div>
  </div>

  <button id="goDrawBtn" class="btn-primary" onclick="goToDraw()" disabled
    style="opacity:0.4;cursor:not-allowed">
    <span>🔀</span> 抽選へ進む
  </button>

  <!-- コートレンタル費用 -->
  <div class="step-card" style="margin-top:14px">
    <div class="step-title">💴 費用計算（任意）</div>
    <div style="display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;gap:6px">
      <input id="costInput" type="text" inputmode="numeric" pattern="[0-9,]*"
        placeholder="例: 3000"
        style="flex:1;font-size:20px;font-weight:700;color:var(--green);text-align:center;padding:10px 0;border:none;outline:none;background:transparent;font-family:'Noto Sans JP',sans-serif;min-width:0"
        oninput="formatCostInput(this);calcCost();updateCostBtn()">
      <span style="font-size:14px;color:var(--text3);flex-shrink:0;padding-right:4px">円</span>
    </div>
  </div>
  </div>
</div>

<!-- 抽選タブ -->
<div id="sec-draw" class="section">
  <div class="sec-label">抽選結果</div>
  <div id="drawResult">
    <div class="empty">
      <div class="empty-icon">🎾</div>
      参加者タブで設定して<br>「抽選へ進む」を押してください
    </div>
  </div>
  <div id="prevNextArea" style="display:none;margin-top:16px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:6px">📋 前回</div>
        <div id="prevResultBody" style="font-size:12px"></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--green);border-radius:var(--radius-sm);padding:10px">
        <div style="font-size:11px;font-weight:700;color:var(--green);letter-spacing:.08em;margin-bottom:6px">🔮 次回予定</div>
        <div id="nextResultBody" style="font-size:12px"></div>
      </div>
    </div>
  </div>
  <button class="btn-primary" onclick="doDraw(false)">🔀 再抽選</button>
  <button class="serve-btn" id="serveBtn" onclick="toggleServe()">🎾 サーブを自動で決める</button>
  <button class="serve-btn" onclick="showCostResult()" id="costBtn" disabled style="opacity:0.4;cursor:not-allowed">💴 一人あたりの費用を確認</button>
  <div id="costResultDraw" style="display:none;background:var(--green-light);border:1px solid var(--green);border-radius:var(--radius-sm);padding:14px;margin-top:8px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:var(--green-dark)"><span id="perPersonDraw">0</span>円</div>
    <div style="font-size:12px;color:var(--green-dark);margin-top:2px">一人あたり</div>
    <div id="costTotalDraw" style="font-size:12px;color:var(--green-dark);opacity:0.7;margin-top:6px"></div>
  </div>
</div>

<!-- 履歴タブ -->
<div id="sec-history" class="section">
  <div class="sec-label">ペア履歴</div>
  <div id="historyList"></div>
</div>



<script>
var playerCount = 0;
var lastDraw = null;
var drawCount = 0;
var pairHistory = {}; // ペア履歴 key="A-B" value=回数
var serveEnabled = false;
var noNameMode = false;
var activeRecognition = null;
var STORAGE_KEY = 'tennis_doubles_v2';

function calcCost() {
  // メイン画面では計算結果を表示しない
}

function updateCntBtn() {}

function formatCostInput(el) {
  var raw = el.value.replace(/[^0-9]/g, '');
  if (raw === '') { el.value = ''; return; }
  el.value = parseInt(raw, 10).toLocaleString();
}

function getCostValue() {
  var el = document.getElementById('costInput');
  if (!el) return 0;
  return parseInt(el.value.replace(/[^0-9]/g, ''), 10) || 0;
}

function updateCostBtn() {
  var cost = getCostValue();
  var btn = document.getElementById('costBtn');
  if (!btn) return;
  var ok = cost && cost > 0;
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '0.4';
  btn.style.cursor = ok ? 'pointer' : 'not-allowed';
}

function onNoNameChange() {
  noNameMode = document.getElementById('noNameChk').checked;
  confirmCount();
}

function confirmCount() {
  var val = parseInt(document.getElementById('cntInput').value);
  var err = document.getElementById('cntError');
  var step2 = document.getElementById('step2Card');
  var goBtn = document.getElementById('goDrawBtn');
  if (!val || val < 4) {
    if (document.getElementById('cntInput').value !== '') {
      err.textContent = '4人以上を入力してください'; err.style.display = 'block';
    } else { err.style.display = 'none'; }
    step2.style.display = 'none';
    playerCount = 0;
    if (goBtn) { goBtn.disabled = true; goBtn.style.opacity = '0.4'; goBtn.style.cursor = 'not-allowed'; }
    return;
  }
  if (val > 30) {
    err.textContent = '30人以下で入力してください'; err.style.display = 'block'; return;
  }
  err.style.display = 'none';
  playerCount = val;
  calcCost();
  if (goBtn) { goBtn.disabled = false; goBtn.style.opacity = '1'; goBtn.style.cursor = 'pointer'; }
  if (noNameMode) {
    step2.style.display = 'none';
  } else {
    renderNameList();
    step2.style.display = 'block';
  }
}


function renderNameList() {
  var list = document.getElementById('nameList');
  var current = list.querySelectorAll('.name-input');
  var existing = Array.from(current).map(function(inp) { return inp.value; });
  list.innerHTML = '';
  for (var i = 0; i < playerCount; i++) {
    var saved = existing[i] || '';
    var row = document.createElement('div');
    row.className = 'name-row';
    var num = document.createElement('div');
    num.className = 'name-num';
    num.textContent = String(i + 1);
    var inp = document.createElement('input');
    inp.className = 'name-input';
    inp.id = 'p' + i;
    inp.type = 'text';
    inp.placeholder = '選手 ' + String(i + 1);
    inp.maxLength = 12;
    inp.value = saved;
    (function(idx) {
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && idx < playerCount - 1) {
          var next = document.getElementById('p' + (idx + 1));
          if (next) next.focus();
        }
      });
    })(i);
    var mic = document.createElement('button');
    mic.className = 'mic-btn';
    mic.id = 'mic' + i;
    mic.textContent = '🎤';
    (function(idx) {
      mic.addEventListener('click', function() { startVoice(idx); });
    })(i);
    row.appendChild(num);
    row.appendChild(inp);
    row.appendChild(mic);
    list.appendChild(row);
  }
}

function switchTab(name) {
  ['players','draw','history'].forEach(function(n) {
    document.getElementById('sec-'+n).classList.toggle('active', n === name);
    var tab = document.getElementById('tab-'+n);
    if (tab) {
      tab.style.color = n === name ? 'var(--green)' : 'var(--text3)';
      tab.style.borderBottom = n === name ? '2px solid var(--green)' : '2px solid transparent';
      tab.style.fontWeight = n === name ? '700' : '500';
    }
  });
  var resetBtn = document.getElementById('resetBtn');
  if (resetBtn) resetBtn.style.display = name !== 'players' ? 'block' : 'none';
  if (name === 'draw') updateCostBtn();
  if (name === 'history') renderHistory();
}

function getPlayers() {
  var result = [];
  for (var i = 0; i < playerCount; i++) {
    var el = document.getElementById('p' + i);
    var v = el ? el.value.trim() : '';
    var label = v ? (String(i+1) + ' ' + v) : String(i+1);
    result.push(label);
  }
  return result;
}

function goToDraw() {
  switchTab('draw');
  doDraw(false);
  updateCostBtn();
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function getPairKey(a, b) {
  return [a, b].sort().join('|||');
}

function getPairCount(a, b) {
  return pairHistory[getPairKey(a, b)] || 0;
}

function savePairs(courts) {
  courts.forEach(function(c) {
    // 同チームのペア
    var k1 = getPairKey(c[0], c[1]);
    var k2 = getPairKey(c[2], c[3]);
    pairHistory[k1] = (pairHistory[k1] || 0) + 1;
    pairHistory[k2] = (pairHistory[k2] || 0) + 1;
  });
}

function shuffleWithPairAvoidance(players) {
  // 100回試してペア重複が最も少ない組み合わせを選ぶ
  var best = null;
  var bestScore = Infinity;
  for (var attempt = 0; attempt < 100; attempt++) {
    var shuffled = shuffle(players);
    var score = 0;
    for (var i = 0; i + 3 < shuffled.length; i += 4) {
      score += getPairCount(shuffled[i], shuffled[i+1]);
      score += getPairCount(shuffled[i+2], shuffled[i+3]);
    }
    if (score < bestScore) {
      bestScore = score;
      best = shuffled;
      if (score === 0) break;
    }
  }
  return best;
}

function doDraw(keepOrder) {
  // 前回結果を保存
  var el = document.getElementById('drawResult');
  var prevNextArea = document.getElementById('prevNextArea');
  var prevBody = document.getElementById('prevResultBody');
  if (!keepOrder && lastDraw && lastDraw.simpleHtml) {
    prevBody.innerHTML = lastDraw.simpleHtml;
  }
  var players = noNameMode
    ? (function() {
        var arr = [];
        for (var i = 0; i < playerCount; i++) arr.push(String(i+1));
        return arr;
      })()
    : getPlayers();

  if (players.length < 4) {
    el.innerHTML = '<div class="warn">⚠️ 4人以上必要です</div>';
    lastDraw = null; return;
  }

  var courts, leftover;
  if (keepOrder && lastDraw) {
    courts = lastDraw.courts;
    leftover = lastDraw.leftover;
  } else {
    var shuffled = shuffleWithPairAvoidance(players);
    courts = [];
    for (var i = 0; i+3 < shuffled.length; i += 4) {
      courts.push(shuffled.slice(i, i+4));
    }
    leftover = shuffled.slice(courts.length * 4);
    savePairs(courts);
  }
  lastDraw = { courts: courts, leftover: leftover, time: new Date(), serveIdxes: serveIdxes };

  // 次回プレビュー生成
  generateNextPreview(players);

  if (!keepOrder) drawCount++;
  var colors = ['#1D9E75','#0F6E56','#158A64','#0D7A58','#1A8A68','#0B6048'];
  var roundText = '第 ' + drawCount + '回';
  var html = '<div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;text-align:center;letter-spacing:.05em">' + roundText + '</div>';

  var serveIdxes = [];
  courts.forEach(function(c, i) {
    var serveIdx = serveEnabled ? Math.floor(Math.random() * 4) : -1;
    serveIdxes.push(serveIdx);
    var col = colors[i % colors.length];

    function pname(name, idx) {
      if (serveEnabled && idx === serveIdx) {
        return '<div class="pname server">🎾 ' + name + '</div>';
      }
      return '<div class="pname">' + name + '</div>';
    }

    html += '<div style="background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden">'
      + '<div style="padding:12px"><div class="vs-grid">'
      + '<div class="team">' + pname(c[0],0) + pname(c[1],1) + '</div>'
      + '<div class="vs-text">VS</div>'
      + '<div class="team">' + pname(c[2],2) + pname(c[3],3) + '</div>'
      + '</div></div></div>';
  });

  if (leftover.length > 0) {
    html += '<div class="leftover-card"><div class="leftover-lbl">⏸ 待機</div><div class="chips">'
      + leftover.map(function(p) { return '<span class="chip">' + p + '</span>'; }).join('')
      + '</div></div>';
  }

  // 前回結果用にシンプルHTMLも生成
  var simpleHtml = '';
  courts.forEach(function(c, i) {
    var si = serveIdxes[i];
    function sname(name, idx) {
      return (serveEnabled && idx === si)
        ? '<strong>🎾' + name + '</strong>'
        : name;
    }
    simpleHtml += '<div style="border-left:3px solid var(--border);padding:6px 10px;margin-bottom:6px;font-size:13px;color:var(--text2)">'
      + sname(c[0],0) + '・' + sname(c[1],1) + ' <span style="color:var(--text3);font-weight:700">vs</span> ' + sname(c[2],2) + '・' + sname(c[3],3)
      + '</div>';
  });

  lastDraw.simpleHtml = simpleHtml;

  el.innerHTML = html;
}

function toggleServe() {
  serveEnabled = !serveEnabled;
  var btn = document.getElementById('serveBtn');
  btn.classList.toggle('active', serveEnabled);
  btn.textContent = serveEnabled ? '✅ サーブ自動決定：ON' : '🎾 サーブを自動で決める';
  if (lastDraw) doDraw(true);
}

function startVoiceCount() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('お使いのブラウザは音声入力に対応していません。\nSafari（iOS）またはChrome（Android）をお試しください。'); return; }
  var btn = document.getElementById('micCount');
  var inp = document.getElementById('cntInput');
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = 'ja-JP';
  rec.interimResults = false;
  rec.maxAlternatives = 5;
  activeRecognition = rec;
  btn.textContent = '🔴';
  rec.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var num = transcript.replace(/人/g, '').replace(/[^\d０-９]/g, '').replace(/[０-９]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); });
    if (!num) {
      var kanji = {'一':'1','二':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9','十':'10','十一':'11','十二':'12','十三':'13','十四':'14','十五':'15','十六':'16','十七':'17','十八':'18','十九':'19','二十':'20'};
      num = kanji[transcript.replace(/人/g, '')] || '';
    }
    if (num) { inp.value = num; updateCntBtn(); confirmCount(); }
    btn.textContent = '🎤';
    activeRecognition = null;
  };
  rec.onerror = function() { btn.textContent = '🎤'; activeRecognition = null; };
  rec.onend = function() { btn.textContent = '🎤'; activeRecognition = null; };
  rec.start();
}

function startVoice(idx) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert('お使いのブラウザは音声入力に対応していません。\nSafari（iOS）またはChrome（Android）をお試しください。');
    return;
  }
  var btn = document.getElementById('mic' + idx);
  var inp = document.getElementById('p' + idx);
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = 'ja-JP';
  rec.interimResults = false;
  rec.maxAlternatives = 5;
  activeRecognition = rec;
  btn.classList.add('recording');
  btn.textContent = '🔴';
  rec.onresult = function(e) {
    // 全候補からひらがな・カタカナのみの候補を優先して取得
    var best = null;
    for (var k = 0; k < e.results[0].length; k++) {
      var candidate = e.results[0][k].transcript;
      // ひらがな・カタカナ・スペースのみの候補を優先
      if (/^[぀-ゟ゠-ヿ\s]+$/.test(candidate)) {
        best = candidate; break;
      }
    }
    // ひらがな候補がなければ最初の候補の読み仮名を推定
    // 漢字を含む場合もカタカナ→ひらがな変換を試みる
    if (!best) best = e.results[0][0].transcript;

    // カタカナ→ひらがな変換
    var t = best.slice(0, 12)
      .replace(/[ァ-ヶ]/g, function(c) {
        return String.fromCharCode(c.charCodeAt(0) - 0x60);
      })
      // 漢字・記号は除去してひらがなとスペースのみ残す
      .replace(/[^぀-ゟ -~\s]/g, function(c) {
        // 英数字はそのまま残す
        if (/[ -~]/.test(c)) return c;
        return '';
      })
      .trim();

    // 変換後が空なら元のテキストをそのまま使用
    if (!t) t = best.slice(0, 12);
    inp.value = t;
    btn.classList.remove('recording'); btn.textContent = '🎤';
    activeRecognition = null;
    if (idx < playerCount - 1) {
      setTimeout(function() {
        var next = document.getElementById('p' + (idx+1));
        if (next) next.focus();
      }, 150);
    }
  };
  rec.onerror = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.onend = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.start();
}

function resetAll() {
  var cntInput = document.getElementById('cntInput');
  if (cntInput) cntInput.value = '';
  var costInput = document.getElementById('costInput');
  if (costInput) costInput.value = '';
  var cr = document.getElementById('costResult');
  if (cr) cr.style.display = 'none';
  var crd = document.getElementById('costResultDraw');
  if (crd) crd.style.display = 'none';
  try { updateCostBtn(); } catch(e) {}
  var cntError = document.getElementById('cntError');
  if (cntError) cntError.style.display = 'none';
  try { updateCntBtn(); } catch(e) {}
  document.getElementById('step2Card').style.display = 'none';
  document.getElementById('nameList').innerHTML = '';
  document.getElementById('noNameChk').checked = false;
  playerCount = 0; lastDraw = null; serveEnabled = false; noNameMode = false; drawCount = 0; pairHistory = {};
  var sb = document.getElementById('serveBtn');
  if (sb) { sb.classList.remove('active'); sb.textContent = '🎾 サーブを自動で決める'; }
  document.getElementById('drawResult').innerHTML = '<div class="empty"><div class="empty-icon">🎾</div>参加者タブで設定して<br>「抽選へ進む」を押してください</div>';
  var pna = document.getElementById('prevNextArea');
  if (pna) pna.style.display = 'none';
  var pb = document.getElementById('prevResultBody');
  if (pb) pb.innerHTML = '';
  var nb = document.getElementById('nextResultBody');
  if (nb) nb.innerHTML = '';
  switchTab('players');
  var resetBtn = document.getElementById('resetBtn');
  if (resetBtn) resetBtn.style.display = 'none';
  setTimeout(function() {
    var ci = document.getElementById('cntInput');
    if (ci) ci.focus();
  }, 100);
}

function saveHistory() {
  if (!lastDraw) { alert('先に抽選してください'); return; }
  var history = loadHistory();
  history.unshift({ time: lastDraw.time.toISOString(), courts: lastDraw.courts, leftover: lastDraw.leftover });
  if (history.length > 30) history = history.slice(0, 30);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
  alert('✅ 履歴に保存しました');
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}

function renderHistory() {
  var list = document.getElementById('historyList');
  var history = loadHistory();
  if (history.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🕐</div>まだ履歴がありません<br>抽選後に保存してください</div>';
    return;
  }
  var days = ['日','月','火','水','木','金','土'];
  list.innerHTML = history.map(function(h, idx) {
    var d = new Date(h.time);
    var ds = (d.getMonth()+1) + '/' + d.getDate() + '（' + days[d.getDay()] + '）' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
    var courts = h.courts.map(function(c, i) {
      return '<div class="history-line">🎾 コート' + (i+1) + ': ' + c[0] + '・' + c[1] + ' <b>vs</b> ' + c[2] + '・' + c[3] + '</div>';
    }).join('');
    var lo = (h.leftover && h.leftover.length)
      ? '<div class="history-line" style="color:var(--text3)">⏸ 待機: ' + h.leftover.join('・') + '</div>' : '';
    return '<div class="history-card">'
      + '<div class="history-head"><span class="history-date">📅 ' + ds + '</span>'
      + '<button class="history-del" onclick="deleteHistory(' + idx + ')">×</button></div>'
      + courts + lo + '</div>';
  }).join('');
}

function deleteHistory(idx) {
  var history = loadHistory();
  history.splice(idx, 1);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
  renderHistory();
}

function clearHistory() {
  if (!confirm('履歴を全て削除しますか？')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  renderHistory();
}
</script>

function showCostResult() {
  var resultDiv = document.getElementById('costResultDraw');
  var perPersonEl = document.getElementById('perPersonDraw');
  var cost = getCostValue();
  if (!cost || playerCount < 4) {
    alert('費用が入力されていません');
    return;
  }
  var pp = Math.ceil(cost / playerCount);
  perPersonEl.textContent = pp.toLocaleString();
  var totalEl = document.getElementById('costTotalDraw');
  if (totalEl) totalEl.textContent = pp.toLocaleString() + '円 × ' + playerCount + ' = ' + (pp * playerCount).toLocaleString() + '円';
  resultDiv.style.display = 'block';
}
</script>
<script>
function generateNextPreview(players) {
  var nextBody = document.getElementById('nextResultBody');
  if (!nextBody) return;
  if (players.length < 4) return;
  var nextShuffled = shuffleWithPairAvoidance(players);
  var nextCourts = [];
  for (var i = 0; i + 3 < nextShuffled.length; i += 4) {
    nextCourts.push(nextShuffled.slice(i, i+4));
  }
  var nextLeftover = nextShuffled.slice(nextCourts.length * 4);
  var colors = ['#1D9E75','#0F6E56','#158A64','#0D7A58','#1A8A68','#0B6048'];
  var html = "";
  nextCourts.forEach(function(c, i) {
    var col = colors[i % colors.length];
    html += "<div style=\"border-left:3px solid " + col + ";padding:6px 10px;margin-bottom:6px;font-size:13px;color:var(--text2)\">"
      + c[0] + " ・ " + c[1] + " <span style=\"color:var(--text3);font-weight:700\">vs</span> " + c[2] + " ・ " + c[3]
      + "</div>";
  });
  if (nextLeftover.length > 0) {
    html += "<div style=\"font-size:12px;color:var(--text3);margin-top:2px\">⏸ 待機: " + nextLeftover.join("・") + "</div>";
  }
  nextBody.innerHTML = html;
  var pna = document.getElementById('prevNextArea');
  if (pna) pna.style.display = 'block';
}
</script>
