<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title id="page-title">Tennis Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #CCDD39; --green-dark: #A0AA20; --green-light: #F8FBCC;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --bg: #121212; --surface: #1E1E1E; --surface2: #2A2A2A;
  --border: rgba(255,255,255,0.1); --text: #FFFFFF; --text2: #CCCCCC; --text3: #888888;
  --radius: 14px; --radius-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 20px; }
.header { background: var(--green); color: #fff; padding: 24px 20px 9px; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; overflow: visible; }
.tab-bar-wrapper { position: fixed; top: var(--header-height, 0px); left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 99; }
.page-content { padding-top: var(--header-height, 52px); padding-bottom: 70px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
.header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.section { display: none; padding: 16px; }
.section.active { display: block; }
.sec-label { font-size: 12px; font-weight: 700; color: var(--green); letter-spacing: 0.08em; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.rank-row { display: grid; grid-template-columns: 36px 1fr auto; align-items: center; gap: 4px; padding: 12px 16px; border-bottom: 1px solid #333; }
.rank-row:last-child { border-bottom: none; }
.rank-num { font-size: 18px; font-weight: 700; color: #888888; min-width: 32px; }
.rank-num.gold { color: #F0A500; }
.rank-num.silver { color: #A0A0A0; }
.rank-num.bronze { color: #C07020; }
.rank-name-hist { flex: 1; font-size: 15px; font-weight: 500; color: #FFFFFF; }
.rank-detail { font-size: 12px; color: #888888; margin-top: 2px; }
.rank-count { font-size: 16px; font-weight: 700; color: var(--green); }
.sec-label button { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.check-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--green); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; cursor: pointer; color: #FFFFFF; }
.check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
.step-card { background: var(--surface); border: 1px solid var(--green); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
.step-num { display: none; }
.step-title { font-size: 14px; font-weight: 700; color: #FFFFFF; margin-bottom: 14px; display: flex; align-items: center; }
.name-list { display: flex; flex-direction: column; gap: 8px; }
.name-row { display: flex; align-items: center; gap: 8px; background: #3D3D3D; border: 1px solid var(--green); border-radius: var(--radius-sm); padding: 8px 8px 8px 12px; }
.name-num { width: 26px; height: 26px; border-radius: 50%; background: #3A3A3A; color: #CCCCCC; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.name-input { flex: 1; min-width: 0; font-size: 15px; border: none; outline: none; background: transparent; color: #FFFFFF; font-family: 'Noto Sans JP', sans-serif; }
.name-input::placeholder { color: var(--text3); }
.mic-btn { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; transition: background .15s; }
.mic-btn.recording { background: #FCEBEB; color: #E24B4A; animation: pulse .6s infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }
.btn-primary { width: 100%; padding: 15px; background: var(--green); color: #1a1a1a; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: background .15s; margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary:active { background: var(--green-dark); }
.btn-primary:disabled { background: #4A4A20; color: #CCDD39; cursor: not-allowed; }
.serve-btn { width: 100%; padding: 13px; background: var(--surface); color: #FFFFFF; border: 1px solid #444; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 8px; transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.serve-btn.active { background: #FAEEDA; border-color: #BA7517; color: #BA7517; }
.court-card { background: var(--surface); border-radius: var(--radius); border: 1px solid #CCDD39; margin-bottom: 10px; overflow: hidden; animation: fadeUp .3s ease both; }
@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.court-top { background: var(--green); color: #1a1a1a; padding: 8px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.court-body { padding: 12px; }
.vs-grid { display: grid; grid-template-columns: 1fr 32px 1fr; gap: 6px; align-items: center; }
.team { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.team-lbl { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: .08em; margin-bottom: 6px; }
.pname { font-size: 14px; font-weight: 500; padding: 2px 0; color: #FFFFFF; }
.pname.server { color: #FFFFFF; font-weight: 700; }
.vs-text { text-align: center; font-size: 14px; font-weight: 700; color: var(--text3); }
.leftover-card { background: var(--surface); border: 1px dashed #444; border-radius: var(--radius); padding: 12px; margin-bottom: 10px; text-align: center; }
.leftover-lbl { font-size: 11px; font-weight: 700; color: #FFFFFF; letter-spacing: .08em; margin-bottom: 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.chip { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid #444; border-radius: 20px; padding: 4px 10px; font-size: 13px; color: #FFFFFF; }
.warn { background: var(--amber-light); color: var(--amber); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; margin-top: 8px; }
.history-line { font-size: 13px; color: var(--text2); padding: 2px 0; }
.history-card { background: var(--surface); border: 1px solid var(--green); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.history-card-header { background: var(--green); color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700; }
.history-card-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #333; }
.history-card-row:last-child { border-bottom: none; }
.history-round-badge { font-size: 11px; font-weight: 700; color: var(--green); white-space: nowrap; min-width: 48px; }
.history-names { flex: 1; font-size: 14px; color: #FFFFFF; }
.history-vs { font-size: 12px; font-weight: 700; color: #888888; margin: 0 4px; }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.8; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
/* гВњгГЦгГРгГЉ */
.tab-bar { display: flex; }
.tab-btn { flex: 1; padding: 10px 4px 12px; border: none; background: transparent; font-size: 20px; font-weight: 700; color: #888888; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: color .15s; filter: grayscale(1) brightness(0.7); font-family: 'Noto Sans JP', sans-serif; }
.tab-btn .tab-label-txt { font-size: 10px; font-weight: 500; color: #888888; }
.tab-btn.active { color: var(--green); filter: none; }
.tab-btn.active .tab-label-txt { color: var(--green); }
.tab-btn:disabled { opacity: 1; color: #444444; filter: grayscale(1) brightness(0.5); cursor: not-allowed; }
.tab-btn:disabled .tab-label-txt { color: #444444; }
/* и®Аи™ЮгГЬгВњгГ≥ */
.lang-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: background .15s; }
.lang-btn.active { background: rgba(255,255,255,0.35); }
</style>

<body>

<div class="header" style="background:transparent;display:flex;align-items:center;justify-content:flex-end;padding:12px 16px;">
  <div style="display:flex;align-items:center;gap:12px">
    <button id="resetBtn" onclick="resetAll()" style="background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px;line-height:1">рЯФД</button>
    <div style="position:relative">
      <div onclick="toggleLangMenu()" id="langBtn" style="cursor:pointer;font-size:22px;line-height:1">
        <span id="langFlag">рЯЗѓрЯЗµ</span>
      </div>
      <div id="langMenu" style="display:none;position:absolute;top:36px;right:0;background:#1E1E1E;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.5);z-index:9999;min-width:56px">
        <div onclick="selectLang('ja')" style="padding:10px 14px;font-size:20px;cursor:pointer;text-align:center;border-bottom:1px solid #333">рЯЗѓрЯЗµ</div>
        <div onclick="selectLang('en')" style="padding:10px 14px;font-size:20px;cursor:pointer;text-align:center;border-bottom:1px solid #333">рЯЗЇрЯЗЄ</div>
        <div onclick="selectLang('kr')" style="padding:10px 14px;font-size:20px;cursor:pointer;text-align:center">рЯЗ∞рЯЗЈ</div>
      </div>
    </div>
  </div>
</div>

<div class="footer" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;background:#1E1E1E;border-top:1px solid #333;display:flex;align-items:center;">
  <div class="tab-bar" style="flex:1;display:flex;">
    <button class="tab-btn active" id="tab-players" onclick="switchTab('players')" id-t="tab_players"><span class="tab-icon">рЯС•</span><span class="tab-label-txt" id="tl-tab-players">еПВеК†иАЕ</span></button>
    <button class="tab-btn" id="tab-draw" onclick="switchTab('draw')" disabled id-t="tab_draw"><span class="tab-icon">рЯОЊ</span><span class="tab-label-txt" id="tl-tab-draw">гВ≤гГЉгГ†</span></button>
    <button class="tab-btn" id="tab-history" onclick="switchTab('history')" disabled id-t="tab_history"><span class="tab-icon">рЯУЛ</span><span class="tab-label-txt" id="tl-tab-history">е±•ж≠і</span></button>
  </div>
</div>

<div class="page-content">
<!-- еПВеК†иАЕгВњгГЦ -->
<div id="sec-players" class="section active">
  <label class="check-row">
    <input type="checkbox" id="noNameChk" onchange="onNoNameChange()">
    <span id="t-no-name-label" style="font-size:15px;font-weight:500;color:var(--text)">No names</span>
    <span id="t-no-name-sub" style="font-size:12px;color:var(--text3);margin-left:auto">Numbers only</span>
  </label>
  <div class="step-card">
    <div class="step-title"><svg width="22" height="22" viewBox="0 0 22 22" style="flex-shrink:0;margin-right:6px"><circle cx="11" cy="11" r="9" fill="#CCDD39"/><path d="M4 7 Q11 3 18 7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M4 15 Q11 19 18 15" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg><span id="t-step1-title">еПВеК†иАЕжХ∞</span></div>
    <div style="display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;gap:6px">
      <input id="cntInput" type="number" inputmode="numeric" pattern="[0-9]*" min="4" max="30"
        style="flex:1;font-size:22px;font-weight:700;color:#FFFFFF;text-align:center;padding:10px 0;border:none;outline:none;background:transparent;font-family:'Noto Sans JP',sans-serif"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');onCountInput()"
        onkeydown="if(event.key==='Enter')confirmCount()">
      <span id="t-step1-unit" style="font-size:14px;color:var(--text3)">ppl</span>
      <button class="mic-btn" id="micCount" onclick="startVoiceCount()" title="Voice input">рЯО§</button>
    </div>
    <div id="cntError" style="font-size:12px;color:var(--amber);margin-top:8px;display:none"></div>
  </div>
  <div class="step-card" id="step2Card" style="display:none">
    <div class="step-title"><svg width="22" height="22" viewBox="0 0 22 22" style="flex-shrink:0;margin-right:6px"><circle cx="11" cy="11" r="9" fill="#CCDD39"/><path d="M4 7 Q11 3 18 7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M4 15 Q11 19 18 15" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg><span id="t-step2-title">еРНеЙН</span></div>
    <div class="name-list" id="nameList"></div>
  </div>
  <button id="goDrawBtn" class="btn-primary" onclick="goToDraw()" disabled style="opacity:0.4;cursor:not-allowed">
    <span>рЯФА</span><span id="t-go-draw-btn">Start Draw</span>
  </button>
  <div class="step-card" style="margin-top:14px">
    <div class="step-title"><span id="t-court-fee-title">рЯТі Court Fee (optional)</span></div>
    <div style="display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;gap:6px">
      <input id="costInput" type="text" inputmode="numeric" pattern="[0-9,]*"
        style="flex:1;font-size:20px;font-weight:700;color:#FFFFFF;text-align:center;padding:10px 0;border:none;outline:none;background:transparent;font-family:'Noto Sans JP',sans-serif;min-width:0"
        oninput="formatCostInput(this);updateCostBtn()">
      <span id="t-court-fee-unit" style="font-size:14px;color:var(--text3);flex-shrink:0;padding-right:4px">JPY</span>
    </div>
  </div>
</div>

<!-- жКљйБЄгВњгГЦ -->
<div id="sec-draw" class="section">

  <!-- зПЊеЬ®гБЃзµРжЮЬпЉИгГХгГЂеєЕпЉЙ -->
  <div id="drawResult">
    <div class="empty"><div class="empty-icon">рЯОЊ</div><span id="t-draw-empty">Set players and press "Start Draw"</span></div>
  </div>
  <!-- дї•еЙНгГїдЇИеЃЪпЉИ2гВЂгГ©гГ†пЉЙ -->
  <div id="prevNextArea" style="display:none;margin-top:12px">
    <div id="nextResult">
      <div style="font-size:11px;font-weight:700;color:#FFFFFF;letter-spacing:.08em;margin-bottom:6px"><span id="t-next-round-label">рЯФЃ Next</span></div>
      <div id="nextResultBody"></div>
    </div>
  </div>
  <button class="btn-primary" onclick="doDraw(false)"><span>рЯФА</span><span id="t-redraw-btn">Redraw</span></button>
  <button class="serve-btn" id="serveBtn" onclick="toggleServe()"><span id="t-serve-btn">рЯОЊ Auto decide serve</span></button>
  <button class="serve-btn" onclick="showCostResult()" id="costBtn" disabled style="opacity:0.4;cursor:not-allowed"><span id="t-cost-btn">рЯТі Show Cost per Person</span></button>
  <div id="costResultDraw" style="display:none;background:#121212;border:2px solid #CCDD39;border-radius:var(--radius-sm);padding:14px;margin-top:8px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:#CCDD39"><span id="costCurrency">¬•</span><span id="perPersonDraw">0</span></div>
    <div style="font-size:12px;color:#CCDD39;margin-top:2px" id="t-cost-per-person">per person</div>
    <div id="costTotalDraw" style="font-size:12px;color:#CCDD39;opacity:0.8;margin-top:6px"></div>
  </div>
</div>

<!-- е±•ж≠ігВњгГЦ -->
<div id="sec-history" class="section">
  <div id="historyList"></div>
</div>
</div><!-- /.page-content -->

<script>
// гГШгГГгГАгГЉйЂШгБХгВТCSSе§ЙжХ∞гБЂеПНжШ†
function updateHeaderHeight() {
  var h = document.querySelector('.header');
  if (h) {
    var hh = h.offsetHeight;
    document.documentElement.style.setProperty('--header-height', hh + 'px');
  }
}
window.addEventListener('load', updateHeaderHeight);
window.addEventListener('resize', updateHeaderHeight);

var playerCount = 0;
var lastDraw = null;
var drawCount = 0;
var pairHistory = {};
var serveHistory = {};
var gameHistory = [];
var serveEnabled = false;
var noNameMode = false;
var currentPlayers = [];
var activeRecognition = null;
var currentLang = 'en';
var i18n = {};

// ===== i18n =====
function toggleLangMenu() {
  var menu = document.getElementById('langMenu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function selectLang(lang) {
  var menu = document.getElementById('langMenu');
  if (menu) menu.style.display = 'none';
  setLang(lang);
}

// гГ°гГЛгГ•гГЉе§ЦгВњгГГгГЧгБІйЦЙгБШгВЛ
document.addEventListener('click', function(e) {
  var btn = document.getElementById('langBtn');
  var menu = document.getElementById('langMenu');
  if (menu && btn && !btn.contains(e.target) && !menu.contains(e.target)) {
    menu.style.display = 'none';
  }
});

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('tennis_draw_lang', lang);
  document.documentElement.lang = lang === 'ja' ? 'ja' : lang === 'kr' ? 'ko' : 'en';
  // гВҐгВ§гВ≥гГ≥еН≥жЩВжЫіжЦ∞
  var _icons = {'ja':'рЯЗѓрЯЗµ','en':'рЯЗЇрЯЗЄ','kr':'рЯЗ∞рЯЗЈ'};
  var _langFlag = document.getElementById('langFlag');
  if (_langFlag) _langFlag.textContent = _icons[lang] || 'рЯЗѓрЯЗµ';
  // и®Аи™ЮгГЬгВњгГ≥гБЃactiveзКґжЕЛ
  ['ja','en','kr'].forEach(function(l) {
    var btn = document.querySelector('.lang-btn[onclick="setLang(\'' + l + '\')"]');
    if (btn) btn.classList.toggle('active', l === lang);
  });
  loadI18n(lang, function() {
    applyI18n();
    if (lastDraw) {
      var players2 = noNameMode
        ? (function() { var arr = []; for (var i2 = 0; i2 < playerCount; i2++) arr.push(String(i2+1)); return arr; })()
        : getPlayers();
      doDraw(true);
      generateNextPreview(players2, true);
    }
    // е±•ж≠ізФїйЭҐгБМи°®з§ЇдЄ≠гБ™гВЙеЖНжППзФї
    var secHistory = document.getElementById('sec-history');
    if (secHistory && secHistory.classList.contains('active')) {
      renderHistory();
    }
  });
}

function loadI18n(lang, callback) {
  fetch(lang + '.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) { i18n = data; callback(); })
    .catch(function() { console.warn('Failed to load ' + lang + '.json'); });
}

function t(key) {
  return (key in i18n) ? i18n[key] : key;
}

function applyI18n() {
  // гВњгВ§гГИгГЂ
  document.title = t('app_title');
  var metaTitle = document.getElementById('meta-app-title');
  if (metaTitle) metaTitle.content = t('app_title');

  // data-tе±ЮжАІгБІдЄАжЛђйБ©зФ®
  var map = {
    'app_name': 't-app-name',
    'app_desc': 't-app-desc',
    'tab_players': 'tl-tab-players',
    'tab_draw': 'tl-tab-draw',
    'tab_history': 'tl-tab-history',
    'no_name_label': 't-no-name-label',
    'no_name_sub': 't-no-name-sub',
    'step1_title': 't-step1-title',
    'step1_unit': 't-step1-unit',
    // 'step2_title': 't-step2-title', // гВµгГЦгГЖгВ≠гВєгГИдњЭи≠ЈгБЃгБЯгВБеАЛеИ•еЗ¶зРЖ
    'go_draw_btn': 't-go-draw-btn',
    'court_fee_title': 't-court-fee-title',
    'court_fee_unit': 't-court-fee-unit',
    'next_round_label': 't-next-round-label',
    'prev_result_label': 't-prev-result-label',
    'redraw_btn': 't-redraw-btn',
    'serve_btn': 't-serve-btn',
    'cost_btn': 't-cost-btn',
    'cost_per_person': 't-cost-per-person',
    'history_label': 't-history-label',
    'history_label': 't-history-label'
  };
  Object.keys(map).forEach(function(key) {
    var el = document.getElementById(map[key]);
    if (el) el.textContent = t(key);
  });

  // placeholder
  var cntInput = document.getElementById('cntInput');
  if (cntInput) cntInput.placeholder = t('step1_placeholder');
  // step2_titleгБѓгВµгГЦгГЖгВ≠гВєгГИдїШгБНгБІеАЛеИ•еЗ¶зРЖ

  var s2el = document.getElementById('t-step2-title');
  if (s2el) {

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function getPairKey(a, b) { return [a, b].sort().join('|||'); }
function getPairCount(a, b) { return pairHistory[getPairKey(a, b)] || 0; }

function shuffleWithPairAvoidance(players) {
  var best = null, bestScore = Infinity;
  for (var attempt = 0; attempt < 100; attempt++) {
    var shuffled = shuffle(players);
    var score = 0;
    for (var i = 0; i + 3 < shuffled.length; i += 4) {
      score += getPairCount(shuffled[i], shuffled[i+1]);
      score += getPairCount(shuffled[i+2], shuffled[i+3]);
    }
    if (score < bestScore) { bestScore = score; best = shuffled; if (score === 0) break; }
  }
  return best;
}

function getServeIdx(court) {
  // гВµгГЉгГЦеЫЮжХ∞гБМжЬАгВВе∞СгБ™гБДдЇЇгВТйБЄгБґпЉИеРМеЫЮжХ∞гБЃе†іеРИгБѓгГ©гГ≥гГАгГ†пЉЙ
  if (!serveEnabled) return -1;
  var minCount = Infinity;
  var candidates = [];
  for (var si = 0; si < court.length; si++) {
    var cnt = serveHistory[court[si]] || 0;
    if (cnt < minCount) { minCount = cnt; candidates = [si]; }
    else if (cnt === minCount) { candidates.push(si); }
  }
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function recordServe(court, serveIdx) {
  if (serveIdx >= 0 && court[serveIdx]) {
    serveHistory[court[serveIdx]] = (serveHistory[court[serveIdx]] || 0) + 1;
  }
}

function savePairs(courts, round, serveIdxes) {
  courts.forEach(function(c) {
    var k1 = getPairKey(c[0], c[1]);
    var k2 = getPairKey(c[2], c[3]);
    pairHistory[k1] = (pairHistory[k1] || 0) + 1;
    pairHistory[k2] = (pairHistory[k2] || 0) + 1;
  });
  gameHistory.push({ round: round, courts: JSON.parse(JSON.stringify(courts)), serveIdxes: serveIdxes || [] });
}

function generateNextPreview(players, forceRedraw) {
  var nextBody = document.getElementById('nextResultBody');
  if (!nextBody || players.length < 4) return;
  // жЧҐгБЂжђ°еЫЮгБЃзµДгБњеРИгВПгБЫгБМдњЭе≠ШгБХгВМгБ¶гБДгВМгБ∞гБЭгВМгВТдљњгБЖпЉИеЖНзФЯжИРгБЧгБ™гБДпЉЙ
  var nextCourts, nextLeftover, reusingNext;
  if (!forceRedraw && lastDraw && lastDraw.nextCourts) {
    nextCourts = lastDraw.nextCourts;
    nextLeftover = lastDraw.nextLeftover || [];
    reusingNext = true;
  } else {
    var nextShuffled = shuffleWithPairAvoidance(players);
    nextCourts = [];
    if (nextShuffled.length >= 4) nextCourts.push(nextShuffled.slice(0, 4));
    nextLeftover = nextShuffled.slice(4);
    reusingNext = false;
  }
  var colors = ['#CCDD39','#A0AA20','#B8C830','#8A9418'];
  var html = '';
  var nextServeIdxes = (reusingNext && lastDraw && lastDraw.nextServeIdxes) ? lastDraw.nextServeIdxes : [];
  var generatingServe = !(reusingNext && lastDraw && lastDraw.nextServeIdxes);
  nextCourts.forEach(function(c, i) {
    var col = colors[i % colors.length];
    var nextServeIdx = generatingServe ? getServeIdx(c) : nextServeIdxes[i];
    if (generatingServe) nextServeIdxes.push(nextServeIdx);
    function npname(name, idx) {
      return serveEnabled && idx === nextServeIdx ? '<strong style="color:#FFFFFF">рЯОЊ ' + name + '</strong>' : name;
    }
    html += '<div style="border-left:3px solid #CCDD39;padding:6px 10px;margin-bottom:6px;font-size:13px;color:#FFFFFF">'
      + npname(c[0],0) + ' гГї ' + npname(c[1],1) + ' <span style="color:var(--text3);font-weight:700">vs</span> ' + npname(c[2],2) + ' гГї ' + npname(c[3],3)
      + '</div>';
  });
  nextBody.innerHTML = html;
  // жђ°еЫЮгБЃзµДгБњеРИгВПгБЫгБ®гВµгГЉгГЦгВТlastDrawгБЂдњЭе≠Ш
  if (lastDraw) { lastDraw.nextCourts = nextCourts; lastDraw.nextLeftover = nextLeftover; lastDraw.nextServeIdxes = nextServeIdxes; }
  // дї•еЙНгБЃзµРжЮЬгБМгБВгВЛе†іеРИгБЃгБњprevNextAreaгВТи°®з§Ї
  var pna = document.getElementById('prevNextArea');
  if (pna) pna.style.display = 'block';
}

function startVoiceCount() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert(t('voice_not_supported')); return; }
  var btn = document.getElementById('micCount');
  var inp = document.getElementById('cntInput');
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = currentLang === 'ja' ? 'ja-JP' : currentLang === 'kr' ? 'ko-KR' : 'en-US';
  rec.interimResults = false; rec.maxAlternatives = 1;
  activeRecognition = rec;
  btn.textContent = 'рЯФі';
  rec.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var num = '';
    if (currentLang === 'en') {
      var words = {'one':'1','two':'2','three':'3','four':'4','five':'5','six':'6','seven':'7','eight':'8','nine':'9','ten':'10','eleven':'11','twelve':'12'};
      var t2 = transcript.toLowerCase().replace(/people|players|person/g,'').trim();
      num = words[t2] || t2.replace(/[^0-9]/g,'');
    } else {
      num = transcript.replace(/дЇЇ|л™Е|еЫЮ/g,'').replace(/[^0-9пЉР-пЉЩ]/g,'');
      if (!num) {
        var kanjiMap = {'еЫЫ':'4','дЇФ':'5','еЕ≠':'6','дЄГ':'7','еЕЂ':'8','дєЭ':'9','еНБ':'10','еНБдЄА':'11','еНБдЇМ':'12'};
        num = kanjiMap[transcript.replace(/дЇЇ|л™Е/g,'')] || '';
      }
    }
    if (num) { inp.value = num; confirmCount(); }
    btn.textContent = 'рЯО§'; activeRecognition = null;
  };
  rec.onerror = function() { btn.textContent = 'рЯО§'; activeRecognition = null; };
  rec.onend = function() { btn.textContent = 'рЯО§'; activeRecognition = null; };
  rec.start();
}

function startVoice(idx) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert(t('voice_not_supported')); return; }
  var btn = document.getElementById('mic' + idx);
  var inp = document.getElementById('p' + idx);
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = currentLang === 'ja' ? 'ja-JP' : currentLang === 'kr' ? 'ko-KR' : 'en-US';
  rec.interimResults = false; rec.maxAlternatives = 5;
  activeRecognition = rec;
  btn.classList.add('recording'); btn.textContent = 'рЯФі';
  rec.onresult = function(e) {
    var best = null;
    for (var k = 0; k < e.results[0].length; k++) {
      var candidate = e.results[0][k].transcript;
      if (/^[\u3041-\u30FF\s]+$/.test(candidate)) { best = candidate; break; }
    }
    if (!best) best = e.results[0][0].transcript;
    var t2 = best.slice(0, 12).replace(/[\u30A1-\u30F6]/g, function(c) {
      return String.fromCharCode(c.charCodeAt(0) - 0x60);
    }).replace(/[^\u3041-\u3096\uAC00-\uD7A3a-zA-Z0-9\s]/g, '').trim();
    if (!t2) t2 = best.slice(0, 12);
    inp.value = t2;
    btn.classList.remove('recording'); btn.textContent = 'рЯО§'; activeRecognition = null;
    if (idx < playerCount - 1) {
      setTimeout(function() {
        var next = document.getElementById('p' + (idx+1));
        if (next) next.focus();
      }, 150);
    }
  };
  rec.onerror = function() { btn.classList.remove('recording'); btn.textContent = 'рЯО§'; activeRecognition = null; };
  rec.onend = function() { btn.classList.remove('recording'); btn.textContent = 'рЯО§'; activeRecognition = null; };
  rec.start();
}

function resetAll() {
  var cntInput = document.getElementById('cntInput');
  if (cntInput) cntInput.value = '';
  var costInput = document.getElementById('costInput');
  if (costInput) costInput.value = '';
  document.getElementById('costResultDraw').style.display = 'none';
  updateCostBtn();
  document.getElementById('cntError').style.display = 'none';
  document.getElementById('step2Card').style.display = 'none';
  document.getElementById('nameList').innerHTML = '';
  document.getElementById('noNameChk').checked = false;
  playerCount = 0; lastDraw = null; serveEnabled = false; noNameMode = false; drawCount = 0; pairHistory = {}; gameHistory = []; serveHistory = {};
  var sb = document.getElementById('serveBtn');
  if (sb) { sb.classList.remove('active'); }
  var sbSpan = document.getElementById('t-serve-btn');
  if (sbSpan) sbSpan.textContent = t('serve_btn');
  document.getElementById('drawResult').innerHTML = '<div class="empty"><div class="empty-icon">рЯОЊ</div><span id="t-draw-empty">' + t('draw_empty') + '</span></div>';
  var pna = document.getElementById('prevNextArea');
  if (pna) pna.style.display = 'none';
  var prevBodyR = document.getElementById('prevResultBody');
  if (prevBodyR) prevBodyR.innerHTML = '';
  var goBtn = document.getElementById('goDrawBtn');
  goBtn.disabled = true; goBtn.style.opacity = '0.4'; goBtn.style.cursor = 'not-allowed';
  // гВњгГЦгВТйЭЮжіїжАІ
  var td = document.getElementById('tab-draw');
  var th = document.getElementById('tab-history');
  if (td) { td.disabled = true; td.style.cursor = 'not-allowed'; td.style.opacity = '0.35'; td.classList.remove('active'); }
  if (th) { th.disabled = true; th.style.cursor = 'not-allowed'; th.style.opacity = '0.35'; th.classList.remove('active'); }
  switchTab('players');
  document.getElementById('resetBtn').style.display = 'block';
  setTimeout(function() { var ci = document.getElementById('cntInput'); if (ci) ci.focus(); }, 100);
}
