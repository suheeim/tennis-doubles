<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" id="meta-app-title" content="Tennis Draw">
<title id="page-title">Tennis Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE;
  --amber: #BA7517; --amber-light: #FAEEDA;
  --bg: #f5f7f5; --surface: #ffffff; --surface2: #f0f3f0;
  --border: rgba(0,0,0,0.1); --text: #1a1a1a; --text2: #555; --text3: #999;
  --radius: 14px; --radius-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 20px; }
.header { background: var(--green); color: #fff; padding: 48px 20px 18px; position: sticky; top: 0; z-index: 10; overflow: hidden; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
.header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.section { display: none; padding: 16px; }
.section.active { display: block; }
.sec-label { font-size: 12px; font-weight: 700; color: var(--green); letter-spacing: 0.08em; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.sec-label button { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.check-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; cursor: pointer; }
.check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
.step-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
.step-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--green); color: #fff; font-size: 11px; font-weight: 700; margin-right: 6px; }
.step-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.name-list { display: flex; flex-direction: column; gap: 8px; }
.name-row { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 8px 8px 12px; }
.name-num { width: 26px; height: 26px; border-radius: 50%; background: var(--green-light); color: var(--green-dark); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.name-input { flex: 1; min-width: 0; font-size: 15px; border: none; outline: none; background: transparent; color: var(--text); font-family: 'Noto Sans JP', sans-serif; }
.name-input::placeholder { color: var(--text3); }
.mic-btn { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; transition: background .15s; }
.mic-btn.recording { background: #FCEBEB; color: #E24B4A; animation: pulse .6s infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }
.btn-primary { width: 100%; padding: 15px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: background .15s; margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary:active { background: var(--green-dark); }
.serve-btn { width: 100%; padding: 13px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 8px; transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.serve-btn.active { background: #FAEEDA; border-color: #BA7517; color: #BA7517; }
.court-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; animation: fadeUp .3s ease both; }
@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.court-top { background: var(--green); color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.court-body { padding: 12px; }
.vs-grid { display: grid; grid-template-columns: 1fr 32px 1fr; gap: 6px; align-items: center; }
.team { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.team-lbl { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: .08em; margin-bottom: 6px; }
.pname { font-size: 14px; font-weight: 500; padding: 2px 0; }
.pname.server { color: var(--green-dark); font-weight: 700; }
.vs-text { text-align: center; font-size: 14px; font-weight: 700; color: var(--text3); }
.leftover-card { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; text-align: center; }
.leftover-lbl { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .08em; margin-bottom: 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.chip { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 13px; color: var(--text); }
.warn { background: var(--amber-light); color: var(--amber); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; margin-top: 8px; }
.history-line { font-size: 13px; color: var(--text2); padding: 2px 0; }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.8; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
/* タブバー */
.tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 12px 4px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--text3); border-bottom: 2px solid transparent; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: color .15s; }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }
.tab-btn:disabled { opacity: 0.35; cursor: not-allowed; }
/* 言語ボタン */
.lang-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: background .15s; }
.lang-btn.active { background: rgba(255,255,255,0.35); }
</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>

<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1 id="t-app-name">🎾 Doubles Draw</h1>
      <p id="t-app-desc">Auto court assignment</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <div style="display:flex;gap:4px">
        <button class="lang-btn" onclick="setLang('ja')">🇯🇵</button>
        <button class="lang-btn" onclick="setLang('en')">🇺🇸</button>
        <button class="lang-btn" onclick="setLang('kr')">🇰🇷</button>
      </div>
      <button id="resetBtn" onclick="resetAll()" style="display:none;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif" id-t="reset_btn">🏠 Reset</button>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-players" onclick="switchTab('players')" id-t="tab_players">Players</button>
  <button class="tab-btn" id="tab-draw" onclick="switchTab('draw')" disabled id-t="tab_draw">Draw</button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')" disabled id-t="tab_history">History</button>
</div>

<!-- 参加者タブ -->
<div id="sec-players" class="section active">
  <label class="check-row">
    <input type="checkbox" id="noNameChk" onchange="onNoNameChange()">
    <span id="t-no-name-label" style="font-size:15px;font-weight:500;color:var(--text)">No names</span>
    <span id="t-no-name-sub" style="font-size:12px;color:var(--text3);margin-left:auto">Numbers only</span>
  </label>
  <div class="step-card">
    <div class="step-title"><span class="step-num">1</span><span id="t-step1-title">Enter number of players</span></div>
    <div style="display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;gap:6px">
      <input id="cntInput" type="number" inputmode="numeric" pattern="[0-9]*" min="4" max="30"
        style="flex:1;font-size:22px;font-weight:700;color:var(--green);text-align:center;padding:10px 0;border:none;outline:none;background:transparent;font-family:'Noto Sans JP',sans-serif"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');confirmCount()"
        onkeydown="if(event.key==='Enter')confirmCount()">
      <span id="t-step1-unit" style="font-size:14px;color:var(--text3)">ppl</span>
      <button class="mic-btn" id="micCount" onclick="startVoiceCount()" title="Voice input">🎤</button>
    </div>
    <div id="cntError" style="font-size:12px;color:var(--amber);margin-top:8px;display:none"></div>
  </div>
  <div class="step-card" id="step2Card" style="display:none">
    <div class="step-title"><span class="step-num">2</span><span id="t-step2-title">Enter names (optional)</span></div>
    <div class="name-list" id="nameList"></div>
  </div>
  <button id="goDrawBtn" class="btn-primary" onclick="goToDraw()" disabled style="opacity:0.4;cursor:not-allowed">
    <span>🔀</span><span id="t-go-draw-btn">Start Draw</span>
  </button>
  <div class="step-card" style="margin-top:14px">
    <div class="step-title"><span id="t-court-fee-title">💴 Court Fee (optional)</span></div>
    <div style="display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;gap:6px">
      <input id="costInput" type="text" inputmode="numeric" pattern="[0-9,]*"
        style="flex:1;font-size:20px;font-weight:700;color:var(--green);text-align:center;padding:10px 0;border:none;outline:none;background:transparent;font-family:'Noto Sans JP',sans-serif;min-width:0"
        oninput="formatCostInput(this);updateCostBtn()">
      <span id="t-court-fee-unit" style="font-size:14px;color:var(--text3);flex-shrink:0;padding-right:4px">JPY</span>
    </div>
  </div>
</div>

<!-- 抽選タブ -->
<div id="sec-draw" class="section">
  <div class="sec-label"><span id="t-draw-result-label">Draw Results</span></div>
  <div id="drawResult">
    <div class="empty"><div class="empty-icon">🎾</div><span id="t-draw-empty">Set players and press "Start Draw"</span></div>
  </div>
  <div id="nextResult" style="display:none;margin-top:16px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:8px"><span id="t-next-round-label">🔮 Next Round Preview</span></div>
    <div id="nextResultBody"></div>
  </div>
  <div id="prevResult" style="display:none;margin-top:16px">
    <div style="font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:8px"><span id="t-prev-result-label">📋 Previous Result</span></div>
    <div id="prevResultBody"></div>
  </div>
  <button class="btn-primary" onclick="doDraw(false)"><span>🔀</span><span id="t-redraw-btn">Redraw</span></button>
  <button class="serve-btn" id="serveBtn" onclick="toggleServe()"><span id="t-serve-btn">🎾 Auto decide serve</span></button>
  <button class="serve-btn" onclick="showCostResult()" id="costBtn" disabled style="opacity:0.4;cursor:not-allowed"><span id="t-cost-btn">💴 Show Cost per Person</span></button>
  <div id="costResultDraw" style="display:none;background:var(--green-light);border:1px solid var(--green);border-radius:var(--radius-sm);padding:14px;margin-top:8px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:var(--green-dark)">¥<span id="perPersonDraw">0</span></div>
    <div style="font-size:12px;color:var(--green-dark);margin-top:2px" id="t-cost-per-person">per person</div>
    <div id="costTotalDraw" style="font-size:12px;color:var(--green-dark);opacity:0.7;margin-top:6px"></div>
  </div>
</div>

<!-- 履歴タブ -->
<div id="sec-history" class="section">
  <div class="sec-label"><span id="t-history-label">Pair History</span></div>
  <div id="historyList"></div>
</div>

<script>
var playerCount = 0;
var lastDraw = null;
var drawCount = 0;
var pairHistory = {};
var serveHistory = {};
var gameHistory = [];
var serveEnabled = false;
var noNameMode = false;
var activeRecognition = null;
var currentLang = 'en';
var i18n = {};

// ===== i18n =====
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('tennis_draw_lang', lang);
  document.documentElement.lang = lang === 'ja' ? 'ja' : lang === 'kr' ? 'ko' : 'en';
  // 言語ボタンのactive状態
  ['ja','en','kr'].forEach(function(l) {
    var btn = document.querySelector('.lang-btn[onclick="setLang(\'' + l + '\')"]');
    if (btn) btn.classList.toggle('active', l === lang);
  });
  loadI18n(lang, applyI18n);
}

function loadI18n(lang, callback) {
  fetch(lang + '.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) { i18n = data; callback(); })
    .catch(function() { console.warn('Failed to load ' + lang + '.json'); });
}

function t(key) {
  return i18n[key] || key;
}

function applyI18n() {
  // タイトル
  document.title = t('app_title');
  var metaTitle = document.getElementById('meta-app-title');
  if (metaTitle) metaTitle.content = t('app_title');

  // data-t属性で一括適用
  var map = {
    'app_name': 't-app-name',
    'app_desc': 't-app-desc',
    'tab_players': 'tab-players',
    'tab_draw': 'tab-draw',
    'tab_history': 'tab-history',
    'no_name_label': 't-no-name-label',
    'no_name_sub': 't-no-name-sub',
    'step1_title': 't-step1-title',
    'step1_unit': 't-step1-unit',
    'step2_title': 't-step2-title',
    'go_draw_btn': 't-go-draw-btn',
    'court_fee_title': 't-court-fee-title',
    'court_fee_unit': 't-court-fee-unit',
    'draw_result_label': 't-draw-result-label',
    'next_round_label': 't-next-round-label',
    'prev_result_label': 't-prev-result-label',
    'redraw_btn': 't-redraw-btn',
    'serve_btn': 't-serve-btn',
    'cost_btn': 't-cost-btn',
    'cost_per_person': 't-cost-per-person',
    'history_label': 't-history-label',
    'reset_btn': 'resetBtn'
  };
  Object.keys(map).forEach(function(key) {
    var el = document.getElementById(map[key]);
    if (el) el.textContent = t(key);
  });

  // placeholder
  var cntInput = document.getElementById('cntInput');
  if (cntInput) cntInput.placeholder = t('step1_placeholder');
  var costInput = document.getElementById('costInput');
  if (costInput) costInput.placeholder = t('court_fee_placeholder');

  // draw empty message
  var drawEmpty = document.querySelector('#drawResult .empty span');
  if (drawEmpty) drawEmpty.innerHTML = t('draw_empty');

  // 名前リストのplaceholderを更新
  for (var i = 0; i < playerCount; i++) {
    var inp = document.getElementById('p' + i);
    if (inp) inp.placeholder = t('player_placeholder') + String(i + 1);
  }

  // サーブボタン状態を維持
  var serveBtn = document.getElementById('serveBtn');
  if (serveBtn) {
    var sbSpan = document.getElementById('t-serve-btn');
    if (sbSpan) sbSpan.textContent = serveEnabled ? t('serve_btn_on') : t('serve_btn');
  }
}

// ===== 機能 =====
function formatCostInput(el) {
  var raw = el.value.replace(/[^0-9]/g, '');
  if (raw === '') { el.value = ''; return; }
  el.value = parseInt(raw, 10).toLocaleString();
}

function getCostValue() {
  var el = document.getElementById('costInput');
  if (!el) return 0;
  return parseInt(el.value.replace(/[^0-9]/g, ''), 10) || 0;
}

function updateCostBtn() {
  var cost = getCostValue();
  var btn = document.getElementById('costBtn');
  if (!btn) return;
  var ok = cost && cost > 0;
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '0.4';
  btn.style.cursor = ok ? 'pointer' : 'not-allowed';
}

function onNoNameChange() {
  noNameMode = document.getElementById('noNameChk').checked;
  confirmCount();
}

function confirmCount() {
  var val = parseInt(document.getElementById('cntInput').value);
  var err = document.getElementById('cntError');
  if (!val || val < 4) {
    if (document.getElementById('cntInput').value !== '') {
      err.textContent = t('step1_err_min'); err.style.display = 'block';
    }
    return;
  }
  if (val > 30) {
    err.textContent = t('step1_err_max'); err.style.display = 'block'; return;
  }
  err.style.display = 'none';
  playerCount = val;
  if (noNameMode) {
    goToDraw();
    return;
  }
  renderNameList();
  document.getElementById('step2Card').style.display = 'block';
  var goBtn = document.getElementById('goDrawBtn');
  goBtn.disabled = false; goBtn.style.opacity = '1'; goBtn.style.cursor = 'pointer';
  setTimeout(function() {
    var p0 = document.getElementById('p0');
    if (p0) p0.focus();
  }, 100);
}

function renderNameList() {
  var list = document.getElementById('nameList');
  var current = list.querySelectorAll('.name-input');
  var existing = Array.from(current).map(function(inp) { return inp.value; });
  list.innerHTML = '';
  for (var i = 0; i < playerCount; i++) {
    var saved = existing[i] || '';
    var row = document.createElement('div');
    row.className = 'name-row';
    var num = document.createElement('div');
    num.className = 'name-num';
    num.textContent = String(i + 1);
    var inp = document.createElement('input');
    inp.className = 'name-input';
    inp.id = 'p' + i;
    inp.type = 'text';
    inp.placeholder = t('player_placeholder') + String(i + 1);
    inp.maxLength = 12;
    inp.value = saved;
    (function(idx) {
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && idx < playerCount - 1) {
          var next = document.getElementById('p' + (idx + 1));
          if (next) next.focus();
        }
      });
    })(i);
    var mic = document.createElement('button');
    mic.className = 'mic-btn';
    mic.id = 'mic' + i;
    mic.textContent = '🎤';
    (function(idx) {
      mic.addEventListener('click', function() { startVoice(idx); });
    })(i);
    row.appendChild(num); row.appendChild(inp); row.appendChild(mic);
    list.appendChild(row);
  }
}

function switchTab(name) {
  ['players','draw','history'].forEach(function(n) {
    document.getElementById('sec-'+n).classList.toggle('active', n === name);
    var tab = document.getElementById('tab-'+n);
    if (tab && !tab.disabled) {
      tab.classList.toggle('active', n === name);
    }
  });
  var resetBtn = document.getElementById('resetBtn');
  if (resetBtn) resetBtn.style.display = name !== 'players' ? 'block' : 'none';
  if (name === 'draw') updateCostBtn();
  if (name === 'history') renderHistory();
}

function getPlayers() {
  var result = [];
  for (var i = 0; i < playerCount; i++) {
    var el = document.getElementById('p' + i);
    var v = el ? el.value.trim() : '';
    result.push(v ? v : String(i + 1));
  }
  return result;
}

function goToDraw() {
  var td = document.getElementById('tab-draw');
  var th = document.getElementById('tab-history');
  if (td) { td.disabled = false; td.style.cursor = 'pointer'; td.style.opacity = '1'; }
  if (th) { th.disabled = false; th.style.cursor = 'pointer'; th.style.opacity = '1'; }
  switchTab('draw');
  doDraw(false);
  updateCostBtn();
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function getPairKey(a, b) { return [a, b].sort().join('|||'); }
function getPairCount(a, b) { return pairHistory[getPairKey(a, b)] || 0; }

function shuffleWithPairAvoidance(players) {
  var best = null, bestScore = Infinity;
  for (var attempt = 0; attempt < 100; attempt++) {
    var shuffled = shuffle(players);
    var score = 0;
    for (var i = 0; i + 3 < shuffled.length; i += 4) {
      score += getPairCount(shuffled[i], shuffled[i+1]);
      score += getPairCount(shuffled[i+2], shuffled[i+3]);
    }
    if (score < bestScore) { bestScore = score; best = shuffled; if (score === 0) break; }
  }
  return best;
}

function savePairs(courts, round) {
  courts.forEach(function(c) {
    var k1 = getPairKey(c[0], c[1]);
    var k2 = getPairKey(c[2], c[3]);
    pairHistory[k1] = (pairHistory[k1] || 0) + 1;
    pairHistory[k2] = (pairHistory[k2] || 0) + 1;
  });
  gameHistory.push({ round: round, courts: JSON.parse(JSON.stringify(courts)) });
}

function doDraw(keepOrder) {
  var el = document.getElementById('drawResult');
  var prevBody = document.getElementById('prevResultBody');
  if (!keepOrder && lastDraw && lastDraw.simpleHtml) {
    prevBody.innerHTML = lastDraw.simpleHtml;
    document.getElementById('prevResult').style.display = 'block';
  }
  var players = noNameMode
    ? (function() { var arr = []; for (var i = 0; i < playerCount; i++) arr.push(String(i+1)); return arr; })()
    : getPlayers();

  if (players.length < 4) {
    el.innerHTML = '<div class="warn">' + t('warn_min') + '</div>';
    lastDraw = null; return;
  }

  var courts, leftover;
  if (keepOrder && lastDraw) {
    courts = lastDraw.courts; leftover = lastDraw.leftover;
  } else {
    var shuffled = shuffleWithPairAvoidance(players);
    courts = [];
    for (var i = 0; i + 3 < shuffled.length; i += 4) courts.push(shuffled.slice(i, i+4));
    leftover = shuffled.slice(courts.length * 4);
    drawCount++;
    savePairs(courts, drawCount);
  }

  var serveIdxes = courts.map(function() { return serveEnabled ? Math.floor(Math.random() * 4) : -1; });
  var colors = ['#1D9E75','#0F6E56','#158A64','#0D7A58','#1A8A68','#0B6048'];
  var html = '';
  courts.forEach(function(c, i) {
    var col = colors[i % colors.length];
    var si = serveIdxes[i];
    function pname(name, idx) {
      return (serveEnabled && idx === si)
        ? '<div class="pname server">🎾' + name + '</div>'
        : '<div class="pname">' + name + '</div>';
    }
    html += '<div class="court-card">'
      + '<div class="court-top" style="background:' + col + '">🎾 Court ' + (i+1) + '</div>'
      + '<div class="court-body"><div class="vs-grid">'
      + '<div class="team"><div class="team-lbl">TEAM A</div>' + pname(c[0],0) + pname(c[1],1) + '</div>'
      + '<div class="vs-text">VS</div>'
      + '<div class="team"><div class="team-lbl">TEAM B</div>' + pname(c[2],2) + pname(c[3],3) + '</div>'
      + '</div></div></div>';
  });
  if (leftover.length > 0) {
    html += '<div class="leftover-card"><div class="leftover-lbl">WAITING</div><div class="chips">'
      + leftover.map(function(p) { return '<span class="chip">⏳ ' + p + '</span>'; }).join('')
      + '</div></div>';
  }

  var simpleHtml = '';
  courts.forEach(function(c, i) {
    var si = serveIdxes[i];
    function sname(name, idx) { return (serveEnabled && idx === si) ? '<strong>🎾'+name+'</strong>' : name; }
    simpleHtml += '<div style="border-left:3px solid var(--border);padding:6px 10px;margin-bottom:6px;font-size:13px;color:var(--text2)">'
      + sname(c[0],0) + '・' + sname(c[1],1) + ' <span style="color:var(--text3);font-weight:700">vs</span> ' + sname(c[2],2) + '・' + sname(c[3],3)
      + '</div>';
  });

  lastDraw = { courts: courts, leftover: leftover, time: new Date(), simpleHtml: simpleHtml };
  el.innerHTML = html;
  generateNextPreview(players);
}

function toggleServe() {
  serveEnabled = !serveEnabled;
  var sbSpan = document.getElementById('t-serve-btn');
  if (sbSpan) sbSpan.textContent = serveEnabled ? t('serve_btn_on') : t('serve_btn');
  document.getElementById('serveBtn').classList.toggle('active', serveEnabled);
  if (lastDraw) doDraw(true);
}

function generateNextPreview(players) {
  var nextBody = document.getElementById('nextResultBody');
  if (!nextBody || players.length < 4) return;
  var nextShuffled = shuffleWithPairAvoidance(players);
  var nextCourts = [];
  for (var i = 0; i + 3 < nextShuffled.length; i += 4) nextCourts.push(nextShuffled.slice(i, i+4));
  var colors = ['#1D9E75','#0F6E56','#158A64','#0D7A58'];
  var html = '';
  nextCourts.forEach(function(c, i) {
    var col = colors[i % colors.length];
    html += '<div style="border-left:3px solid ' + col + ';padding:6px 10px;margin-bottom:6px;font-size:13px;color:var(--text2)">'
      + c[0] + ' ・ ' + c[1] + ' <span style="color:var(--text3);font-weight:700">vs</span> ' + c[2] + ' ・ ' + c[3]
      + '</div>';
  });
  nextBody.innerHTML = html;
  var pna = document.getElementById('nextResult');
  if (pna) pna.style.display = 'block';
}

function showCostResult() {
  var cost = getCostValue();
  if (!cost || playerCount < 4) { alert(t('cost_alert')); return; }
  var pp = Math.ceil(cost / playerCount);
  document.getElementById('perPersonDraw').textContent = pp.toLocaleString();
  var totalEl = document.getElementById('costTotalDraw');
  if (totalEl) totalEl.textContent = pp.toLocaleString() + ' × ' + playerCount + ' = ' + (pp * playerCount).toLocaleString();
  document.getElementById('costResultDraw').style.display = 'block';
}

function renderHistory() {
  var list = document.getElementById('historyList');
  if (gameHistory.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🤝</div>' + t('history_empty') + '</div>';
    return;
  }
  var html = '';
  gameHistory.slice().reverse().forEach(function(g) {
    g.courts.forEach(function(c) {
      html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">'
        + '<span style="font-size:11px;font-weight:700;color:var(--green);white-space:nowrap;min-width:50px">' + t('round_label') + g.round + '</span>'
        + '<span style="font-size:14px;color:var(--text)">' + c[0] + '・' + c[1] + ' <span style="color:var(--text3);font-weight:700">vs</span> ' + c[2] + '・' + c[3] + '</span>'
        + '</div>';
    });
  });
  list.innerHTML = html;
}

function startVoiceCount() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert(t('voice_not_supported')); return; }
  var btn = document.getElementById('micCount');
  var inp = document.getElementById('cntInput');
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = currentLang === 'ja' ? 'ja-JP' : currentLang === 'kr' ? 'ko-KR' : 'en-US';
  rec.interimResults = false; rec.maxAlternatives = 1;
  activeRecognition = rec;
  btn.textContent = '🔴';
  rec.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var num = '';
    if (currentLang === 'en') {
      var words = {'one':'1','two':'2','three':'3','four':'4','five':'5','six':'6','seven':'7','eight':'8','nine':'9','ten':'10','eleven':'11','twelve':'12'};
      var t2 = transcript.toLowerCase().replace(/people|players|person/g,'').trim();
      num = words[t2] || t2.replace(/[^0-9]/g,'');
    } else {
      num = transcript.replace(/人|명|回/g,'').replace(/[^0-9０-９]/g,'');
      if (!num) {
        var kanjiMap = {'四':'4','五':'5','六':'6','七':'7','八':'8','九':'9','十':'10','十一':'11','十二':'12'};
        num = kanjiMap[transcript.replace(/人|명/g,'')] || '';
      }
    }
    if (num) { inp.value = num; confirmCount(); }
    btn.textContent = '🎤'; activeRecognition = null;
  };
  rec.onerror = function() { btn.textContent = '🎤'; activeRecognition = null; };
  rec.onend = function() { btn.textContent = '🎤'; activeRecognition = null; };
  rec.start();
}

function startVoice(idx) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert(t('voice_not_supported')); return; }
  var btn = document.getElementById('mic' + idx);
  var inp = document.getElementById('p' + idx);
  if (activeRecognition) { activeRecognition.stop(); activeRecognition = null; return; }
  var rec = new SR();
  rec.lang = currentLang === 'ja' ? 'ja-JP' : currentLang === 'kr' ? 'ko-KR' : 'en-US';
  rec.interimResults = false; rec.maxAlternatives = 5;
  activeRecognition = rec;
  btn.classList.add('recording'); btn.textContent = '🔴';
  rec.onresult = function(e) {
    var best = null;
    for (var k = 0; k < e.results[0].length; k++) {
      var candidate = e.results[0][k].transcript;
      if (/^[\u3041-\u30FF\s]+$/.test(candidate)) { best = candidate; break; }
    }
    if (!best) best = e.results[0][0].transcript;
    var t2 = best.slice(0, 12).replace(/[\u30A1-\u30F6]/g, function(c) {
      return String.fromCharCode(c.charCodeAt(0) - 0x60);
    }).replace(/[^\u3041-\u3096\uAC00-\uD7A3a-zA-Z0-9\s]/g, '').trim();
    if (!t2) t2 = best.slice(0, 12);
    inp.value = t2;
    btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null;
    if (idx < playerCount - 1) {
      setTimeout(function() {
        var next = document.getElementById('p' + (idx+1));
        if (next) next.focus();
      }, 150);
    }
  };
  rec.onerror = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.onend = function() { btn.classList.remove('recording'); btn.textContent = '🎤'; activeRecognition = null; };
  rec.start();
}

function resetAll() {
  var cntInput = document.getElementById('cntInput');
  if (cntInput) cntInput.value = '';
  var costInput = document.getElementById('costInput');
  if (costInput) costInput.value = '';
  document.getElementById('costResultDraw').style.display = 'none';
  updateCostBtn();
  document.getElementById('cntError').style.display = 'none';
  document.getElementById('step2Card').style.display = 'none';
  document.getElementById('nameList').innerHTML = '';
  document.getElementById('noNameChk').checked = false;
  playerCount = 0; lastDraw = null; serveEnabled = false; noNameMode = false; drawCount = 0; pairHistory = {}; gameHistory = []; serveHistory = {};
  var sb = document.getElementById('serveBtn');
  if (sb) { sb.classList.remove('active'); }
  var sbSpan = document.getElementById('t-serve-btn');
  if (sbSpan) sbSpan.textContent = t('serve_btn');
  document.getElementById('drawResult').innerHTML = '<div class="empty"><div class="empty-icon">🎾</div><span id="t-draw-empty">' + t('draw_empty') + '</span></div>';
  document.getElementById('prevResult').style.display = 'none';
  document.getElementById('nextResult').style.display = 'none';
  var prevBody = document.getElementById('prevResultBody');
  if (prevBody) prevBody.innerHTML = '';
  var goBtn = document.getElementById('goDrawBtn');
  goBtn.disabled = true; goBtn.style.opacity = '0.4'; goBtn.style.cursor = 'not-allowed';
  // タブを非活性
  var td = document.getElementById('tab-draw');
  var th = document.getElementById('tab-history');
  if (td) { td.disabled = true; td.style.cursor = 'not-allowed'; td.style.opacity = '0.35'; td.classList.remove('active'); }
  if (th) { th.disabled = true; th.style.cursor = 'not-allowed'; th.style.opacity = '0.35'; th.classList.remove('active'); }
  switchTab('players');
  document.getElementById('resetBtn').style.display = 'none';
  setTimeout(function() { var ci = document.getElementById('cntInput'); if (ci) ci.focus(); }, 100);
}

  var saved = localStorage.getItem('tennis_draw_lang') || 'en';
  setLang(saved);
});
